<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>냉동고 재고 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--sur:#1a1a1a;--s2:#222;--bdr:#2e2e2e;
  --txt:#f0f0f0;--muted:#777;
  --fried:#c084fc;--sauce:#fb923c;--drink:#60a5fa;--fridge:#34d399;--counter:#facc15;
  --danger:#f87171;--ok:#4ade80;
}
body{background:var(--bg);color:var(--txt);font-family:'Nanum Gothic',sans-serif;min-height:100vh;overflow-x:hidden;}

/* 잠금 화면 */
#lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;}
#lock.hide{display:none;}
.lk-icon{font-size:40px;margin-bottom:14px;}
.lk-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.lk-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.pin-dots{display:flex;gap:14px;margin-bottom:28px;}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bdr);background:transparent;}
.dot.on{background:var(--txt);border-color:var(--txt);}
.dot.err{background:var(--danger);border-color:var(--danger);}
.numpad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;margin-bottom:16px;}
.nk{width:72px;height:72px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur);color:var(--txt);font-size:22px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none;}
.nk:active{background:#333;}
.nk.del{background:transparent;border-color:transparent;color:var(--muted);font-size:18px;}
.nk.blank{visibility:hidden;}
.lk-err{font-size:13px;color:var(--danger);min-height:20px;text-align:center;}

/* 헤더 */
header{padding:18px 20px 12px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:18px;font-weight:800;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;}
.hdr-r{display:flex;gap:12px;align-items:center;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:20px;-webkit-tap-highlight-color:transparent;line-height:1;}

/* 검색 및 탭 */
.search-wrap{padding:10px 20px 4px;}
.search-bar{width:100%;padding:10px 16px;background:var(--sur);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:'Nanum Gothic',sans-serif;font-size:14px;outline:none;}
.tab-bar{display:flex;gap:6px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--sur);color:var(--muted);-webkit-tap-highlight-color:transparent;}
.tab.on{color:#0f0f0f;}
.tab[data-c="전체"].on{background:var(--txt);color:#0f0f0f;}
.tab[data-c="볶음밥"].on{background:var(--fried);}
.tab[data-c="소스류"].on{background:var(--sauce);}
.tab[data-c="음료"].on{background:var(--drink);}
.tab[data-c="주방 냉동고"].on{background:var(--fridge);}
.tab[data-c="카운터"].on{background:var(--counter);}

/* 리스트 */
.content{padding:0 20px 140px;}
.alert-banner{margin:12px 0 0;padding:12px 14px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:10px;font-size:13px;font-weight:700;color:var(--danger);display:none;}
.alert-banner.show{display:block;}
.sec-label{font-size:11px;font-weight:700;color:var(--muted);padding:18px 0 8px;display:flex;align-items:center;justify-content:space-between;}
.sec-add-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--bdr);border-radius:12px;padding:3px 10px;cursor:pointer;}
.item-list{display:flex;flex-direction:column;gap:2px;}
.item{display:flex;align-items:center;padding:13px 14px;background:var(--sur);border-radius:8px;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.item.low{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.3);}
.item.zero{border-color:rgba(248,113,113,.6);background:rgba(248,113,113,.14);border:1px solid rgba(248,113,113,.6);}
.dot-cat{width:7px;height:7px;border-radius:50%;}
.item-name{flex:1;font-size:14px;font-weight:700;}
.item-qty{font-family:'DM Mono',monospace;font-size:20px;}
.badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700;}
.badge.low{background:rgba(248,113,113,.2);color:var(--danger);}
.badge.zero{background:rgba(248,113,113,.35);color:var(--danger);}

/* 모달 */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:flex-end;justify-content:center;}
.mbg.open{display:flex;}
.modal{background:#1e1e1e;border-radius:20px 20px 0 0;padding:20px 24px 48px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.m-handle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 18px;}
.m-name{font-size:17px;font-weight:800;text-align:center;}
.m-qty{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;text-align:center;margin:10px 0;}
.m-qty.low, .m-qty.zero{color:var(--danger);}
.m-stepper{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;}
.s-btn{width:58px;height:58px;border-radius:50%;background:var(--s2);color:var(--txt);font-size:28px;border:1px solid var(--bdr);cursor:pointer;}
.m-input{width:100%;height:46px;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);text-align:center;margin-bottom:10px;}
.m-close{width:100%;height:44px;border-radius:10px;background:transparent;border:1px solid var(--bdr);color:var(--muted);margin-top:10px;}

/* 하단 바 */
.bot-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px 32px;display:flex;justify-content:space-between;align-items:flex-end;z-index:200;pointer-events:none;}
.fab{pointer-events:all;width:54px;height:54px;border-radius:50%;background:var(--txt);color:var(--bg);font-size:26px;border:none;box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:0.3s;z-index:1000;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="lock">
  <div class="lk-icon">🔒</div>
  <div class="lk-title">재고 관리 로그인</div>
  <div class="lk-sub">초기 비밀번호: 1234</div>
  <div class="pin-dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="nk" onclick="pinTap('1')">1</button>
    <button class="nk" onclick="pinTap('2')">2</button>
    <button class="nk" onclick="pinTap('3')">3</button>
    <button class="nk" onclick="pinTap('4')">4</button>
    <button class="nk" onclick="pinTap('5')">5</button>
    <button class="nk" onclick="pinTap('6')">6</button>
    <button class="nk" onclick="pinTap('7')">7</button>
    <button class="nk" onclick="pinTap('8')">8</button>
    <button class="nk" onclick="pinTap('9')">9</button>
    <button class="nk blank"></button>
    <button class="nk" onclick="pinTap('0')">0</button>
    <button class="nk del" onclick="pinDel()">⌫</button>
  </div>
  <div class="lk-err" id="lk-err"></div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div>
    <h1>📦 재고 매니저</h1>
    <div class="hdr-sub" id="last-up">데이터 로딩 중...</div>
  </div>
</header>

<div class="search-wrap">
  <input class="search-bar" id="search" type="search" placeholder="상품명으로 검색하세요">
</div>
<div class="tab-bar" id="tab-bar"></div>

<div class="content">
  <div class="alert-banner" id="alert-banner"></div>
  <div id="list-content"></div>
</div>

<div class="mbg" id="edit-bg">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-name" id="m-name"></div>
    <div class="m-qty" id="m-qty"></div>
    <div class="m-stepper">
      <button class="s-btn" id="s-minus">−</button>
      <button class="s-btn" id="s-plus">＋</button>
    </div>
    <input class="m-input" id="m-input" type="number" placeholder="숫자 직접 입력">
    <button class="m-close" id="m-close">닫기</button>
  </div>
</div>

<div class="bot-bar">
  <div></div>
  <button class="fab" id="fab">＋</button>
</div>

<script>
// 기본 설정 및 데이터
var PIN = '1234';
var pinEntry = '';
var inv = [];
var CATS = ['볶음밥', '소스류', '음료', '주방 냉동고', '카운터'];
var CAT_CLR = {'볶음밥':'#c084fc', '소스류':'#fb923c', '음료':'#60a5fa', '주방 냉동고':'#34d399', '카운터':'#facc15'};
var activeTab = '전체';
var searchQ = '';
var modalId = null;

// 초기 샘플 데이터 (사진 기반)
var DEFAULT_INV = [
  {id:1, name:'김치볶음밥', cat:'볶음밥', qty:6, min:10},
  {id:2, name:'낙지볶음밥', cat:'볶음밥', qty:14, min:10},
  {id:3, name:'닭근위튀김', cat:'주방 냉동고', qty:8, min:5},
  {id:4, name:'찹쌀꽈배기', cat:'주방 냉동고', qty:4, min:6},
  {id:5, name:'갈비교자', cat:'주방 냉동고', qty:13, min:5},
  {id:6, name:'순살치킨', cat:'주방 냉동고', qty:26, min:10},
  {id:7, name:'펩시 제로', cat:'음료', qty:15, min:10}
];

function $id(id){ return document.getElementById(id); }

// 저장 및 불러오기
function save(){ localStorage.setItem('inv_v1', JSON.stringify(inv)); }
function load(){
  var data = localStorage.getItem('inv_v1');
  inv = data ? JSON.parse(data) : DEFAULT_INV;
}

// 잠금 기능
function pinTap(n){
  if(pinEntry.length < 4) {
    pinEntry += n;
    updateDots();
    if(pinEntry.length === 4) setTimeout(checkPin, 150);
  }
}
function pinDel(){ pinEntry = pinEntry.slice(0,-1); updateDots(); }
function updateDots(){
  for(var i=0; i<4; i++) $id('d'+i).className = i < pinEntry.length ? 'dot on' : 'dot';
}
function checkPin(){
  if(pinEntry === PIN) $id('lock').classList.add('hide');
  else {
    $id('lk-err').textContent = '틀렸습니다';
    pinEntry = ''; updateDots();
  }
}

// 리스트 렌더링
function render(){
  var html = '';
  var cats = activeTab === '전체' ? CATS : [activeTab];
  var alertItems = [];

  cats.forEach(function(cat){
    var items = inv.filter(function(it){
      return it.cat === cat && it.name.toLowerCase().includes(searchQ.toLowerCase());
    });
    if(items.length === 0) return;

    html += `<div class="sec-label"><span><span style="color:${CAT_CLR[cat]}">●</span> ${cat}</span></div>`;
    items.forEach(function(it){
      var low = it.min && it.qty < it.min;
      var zero = it.qty === 0;
      if(low || zero) alertItems.push(it.name);
      
      html += `<div class="item ${zero?'zero':low?'low':''}" onclick="openModal(${it.id})">
        <div class="item-name">${it.name}</div>
        <div class="item-qty">${it.qty}</div>
        ${zero?'<span class="badge zero">소진</span>':low?'<span class="badge low">발주</span>':''}
      </div>`;
    });
  });

  $id('list-content').innerHTML = html || '<div style="padding:40px; text-align:center; color:#777;">품목이 없습니다.</div>';
  
  var banner = $id('alert-banner');
  if(alertItems.length > 0){
    banner.textContent = '🚨 발주 필요: ' + alertItems.join(', ');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
  $id('last-up').textContent = '최종 업데이트: ' + new Date().toLocaleTimeString();
}

function renderTabs(){
  var html = '<div class="tab '+(activeTab==='전체'?'on':'')+'" data-c="전체">전체</div>';
  CATS.forEach(function(cat){
    html += `<div class="tab ${activeTab===cat?'on':''}" data-c="${cat}">${cat}</div>`;
  });
  $id('tab-bar').innerHTML = html;
  document.querySelectorAll('.tab').forEach(function(t){
    t.onclick = function(){ activeTab = this.dataset.c; renderTabs(); render(); };
  });
}

// 모달 제어
function openModal(id){
  modalId = id;
  var it = inv.find(function(i){ return i.id === id; });
  $id('m-name').textContent = it.name;
  $id('m-qty').textContent = it.qty;
  $id('edit-bg').classList.add('open');
}
$id('m-close').onclick = function(){ $id('edit-bg').classList.remove('open'); };

$id('s-plus').onclick = function(){
  var it = inv.find(function(i){ return i.id === modalId; });
  it.qty++; save(); openModal(modalId); render();
};
$id('s-minus').onclick = function(){
  var it = inv.find(function(i){ return i.id === modalId; });
  if(it.qty > 0) it.qty--; save(); openModal(modalId); render();
};
$id('m-input').onchange = function(){
  var it = inv.find(function(i){ return i.id === modalId; });
  it.qty = parseInt(this.value) || 0;
  this.value = ''; save(); openModal(modalId); render();
};

$id('search').oninput = function(){ searchQ = this.value; render(); };

// 초기화
load();
renderTabs();
render();
</script>
</body>
</html>
